
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#347fb3">
        <animate attributeName="stop-color"
                 values="#347fb3;#3b8fc5;#347fb3"
                 dur="6s"
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#37d0ac">
        <animate attributeName="stop-color"
                 values="#37d0ac;#4ae0bb;#37d0ac"
                 dur="6s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="256" height="256" fill="url(#bg)"/>

  <polygon points="0,105 38,145 0,145"
           fill="#7fd0d3"
           opacity="0.45">
    <animateTransform attributeName="transform"
                      type="translate"
                      values="0 0; 4 -3; 0 0"
                      dur="4s"
                      repeatCount="indefinite"/>
  </polygon>

  <polygon points="228,58 256,122 196,122"
           fill="#7fd0d3"
           opacity="0.25">
    <animateTransform attributeName="transform"
                      type="translate"
                      values="0 0; -4 3; 0 0"
                      dur="5s"
                      repeatCount="indefinite"/>
  </polygon>

  <text x="24"
        y="128"
        font-family="monospace"
        font-size="58"
        fill="#ffffff"
        opacity="0">
    tsjippy
    <animate attributeName="opacity"
             from="0"
             to="1"
             dur="1.5s"
             fill="freeze"/>
  </text>

  <text x="24"
        y="178"
        font-family="Arial, sans-serif"
        font-size="18"
        font-weight="700"
        fill="#6b8f96"
        opacity="0">
    Comments
    <animate attributeName="opacity"
             begin="0.7s"
             from="0"
             to="1"
             dur="1.5s"
             fill="freeze"/>
  </text>

  <path d="M0 174 C70 160, 130 190, 256 176"
        fill="none"
        stroke="#7fd0d3"
        stroke-width="1"
        opacity="0.5"
        stroke-dasharray="400"
        stroke-dashoffset="400">
    <animate attributeName="stroke-dashoffset"
             from="400"
             to="0"
             dur="3s"
             repeatCount="indefinite"/>
  </path>
</svg>
